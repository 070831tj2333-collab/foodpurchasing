<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>管理员注册</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
          crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/theme.css}" href="/css/theme.css">
</head>
<body>
<div class="container mt-5" style="max-width: 500px;">
    <h2 class="mb-4 text-center">管理员注册</h2>

    <form action="/admin/register" method="post" th:object="${form}">
        <div class="mb-3">
            <label class="form-label">管理员账号</label>
            <input type="text" class="form-control" th:field="*{username}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">密码</label>
            <input type="password" class="form-control" th:field="*{password}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">确认密码</label>
            <input type="password" class="form-control" th:field="*{confirmPassword}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">注册专用密码</label>
            <input type="password" class="form-control" th:field="*{registerPassword}" required>
            <div class="form-text">只有知道专用密码的人才能注册管理员账号。</div>
        </div>
        <button type="submit" class="btn btn-primary w-100">注册</button>
    </form>

    <div class="mt-3 text-center">
        已有账号？<a href="/admin/login">去登录</a>
    </div>
</div>
</body>
</html>
