<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>新增食品</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
          crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/theme.css}" href="/css/theme.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">校园食品管理后台</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" href="/admin/students">学生管理</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/admin/foods">食品管理</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/admin/announcements">公告管理</a>
                </li>
            </ul>
            <a class="btn btn-outline-light btn-sm" href="/logout">退出登录</a>
        </div>
    </div>
</nav>

<div class="container">
    <h2 class="mb-4">新增食品</h2>

    <form action="/admin/foods" method="post" enctype="multipart/form-data" class="col-md-6">
        <div class="mb-3">
            <label class="form-label">食品名称</label>
            <input type="text" name="name" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">成分列表</label>
            <textarea name="ingredients" class="form-control" rows="4" required></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">食品图片</label>
            <input type="file" name="image" class="form-control" accept="image/*" required>
        </div>
        <button class="btn btn-primary" type="submit">保存</button>
        <a class="btn btn-secondary" href="/admin/foods">返回</a>
    </form>
</div>

</body>
</html>
