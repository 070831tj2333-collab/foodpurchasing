<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>食品管理</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
          crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/theme.css}" href="/css/theme.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">校园食品管理后台</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" href="/admin/students">学生管理</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/admin/foods">食品管理</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/admin/announcements">公告管理</a>
                </li>
            </ul>
            <a class="btn btn-outline-light btn-sm" href="/logout">退出登录</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>食品列表</h2>
        <a class="btn btn-primary" href="/admin/foods/new">新增食品</a>
    </div>

    <table class="table table-striped table-hover">
        <thead>
        <tr>
            <th>图片</th>
            <th>名称</th>
            <th>成分</th>
            <th>点赞数</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="food : ${foods}">
            <td style="width: 120px">
                <img th:src="${food.imagePath}" alt="food" class="img-fluid" style="max-height: 80px;">
            </td>
            <td th:text="${food.name}">食品名称</td>
            <td th:text="${food.ingredients}">成分</td>
            <td th:text="${food.likeCount}">0</td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
