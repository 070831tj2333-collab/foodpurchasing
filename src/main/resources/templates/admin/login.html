<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>管理员登录</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
          crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/theme.css}" href="/css/theme.css">
</head>
<body>
<div class="container mt-5" style="max-width: 500px;">
    <h2 class="mb-4 text-center">管理员登录</h2>

    <div class="alert alert-danger" role="alert" th:if="${param.error != null}">
        账号或密码错误，请重试。
    </div>

    <form th:action="@{/admin/login}" method="post" action="/admin/login">
        <div class="mb-3">
            <label class="form-label">账号</label>
            <input type="text" class="form-control" name="username" required autocomplete="username">
        </div>
        <div class="mb-3">
            <label class="form-label">密码</label>
            <input type="password" class="form-control" name="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary w-100">登录</button>
    </form>

    <div class="mt-3 text-center">
        还没有管理员账号？<a href="/admin/register">去注册</a>
    </div>
</div>
</body>
</html>
