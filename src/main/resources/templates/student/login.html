<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>学生登录</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
          crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/theme.css}" href="/css/theme.css">
</head>
<body>
<div class="container mt-5" style="max-width: 500px;">
    <h2 class="mb-4 text-center">学生登录</h2>

    <form action="/student/login" method="post" th:object="${form}">
        <div class="mb-3">
            <label class="form-label">账号名（四个小写字母）</label>
            <input type="text" class="form-control" th:field="*{username}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">手机号后四位</label>
            <input type="text" class="form-control" th:field="*{phoneSuffix}" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">登录</button>
    </form>

    <div class="mt-3 text-center">
        还没有账号？<a href="/student/register">去注册</a>
    </div>
</div>
</body>
</html>
