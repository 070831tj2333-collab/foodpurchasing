<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>注册成功</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
          crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/theme.css}" href="/css/theme.css">
</head>
<body>
<div class="container mt-5" style="max-width: 500px;">
    <div class="alert alert-success">
        <h4 class="alert-heading">注册成功！</h4>
        <p>系统已为你生成账户名：</p>
        <p class="fs-3 fw-bold text-primary" th:text="${username}">abcd</p>
        <hr>
        <p class="mb-0">
            登录方式：<br>
            账号名 + 手机号后四位（你刚填写的手机号后四位是
            <span class="fw-bold" th:text="${phoneSuffix}">1234</span>）。
        </p>
    </div>

    <a class="btn btn-primary w-100" href="/student/login">去登录</a>
</div>
</body>
</html>
