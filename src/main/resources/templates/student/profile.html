<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>我的账户</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
          crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/theme.css}" href="/css/theme.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">校园食品</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" href="/foods">食品列表</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/student/profile">我的账户</a>
                </li>
            </ul>
            <a class="btn btn-outline-light btn-sm" href="/logout">退出登录</a>
        </div>
    </div>
</nav>

<div class="container" style="max-width: 600px;">
    <h2 class="mb-4">我的账户</h2>

    <div class="card">
        <div class="card-body">
            <p><strong>账号名：</strong><span th:text="${student.username}">abcd</span></p>
            <p><strong>姓名：</strong><span th:text="${student.name}">张三</span></p>
            <p><strong>班级：</strong><span th:text="${student.clazz}">高一(1)班</span></p>
            <p><strong>手机号：</strong>
                <span th:text="${#strings.length(student.phone) > 4} ? ${'****' + #strings.substring(student.phone, #strings.length(student.phone) - 4)} : ${student.phone}">
                    138****8888
                </span>
            </p>
            <p class="fs-4 mt-3">
                <strong>账户余额：</strong>
                <span class="text-success"
                      th:text="${#numbers.formatDecimal(student.balance, 1, 2)}">0.00</span> 元
            </p>
        </div>
    </div>
</div>

</body>
</html>
