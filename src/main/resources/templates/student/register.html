<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>学生注册</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
          crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/theme.css}" href="/css/theme.css">
</head>
<body>
<div class="container mt-5" style="max-width: 500px;">
    <h2 class="mb-4 text-center">学生注册</h2>

    <form action="/student/register" method="post" th:object="${form}">
        <div class="mb-3">
            <label class="form-label">姓名</label>
            <input type="text" class="form-control" th:field="*{name}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">班级</label>
            <input type="text" class="form-control" th:field="*{clazz}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">手机号</label>
            <input type="tel" class="form-control" th:field="*{phone}" required>
            <div class="form-text">登录时需要用到手机号后四位。</div>
        </div>
        <button type="submit" class="btn btn-primary w-100">注册</button>
    </form>

    <div class="mt-3 text-center">
        已有账号？<a href="/student/login">去登录</a>
    </div>
</div>
</body>
</html>
