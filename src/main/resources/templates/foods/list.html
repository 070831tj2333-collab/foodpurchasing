<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>校园美食</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
          crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/theme.css}" href="/css/theme.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">校园食品</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" href="/foods">食品列表</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/student/profile">我的账户</a>
                </li>
            </ul>
            <a class="btn btn-outline-light btn-sm me-2" href="/student/login">学生登录</a>
            <a class="btn btn-outline-light btn-sm" href="/admin/login">管理后台</a>
        </div>
    </div>
</nav>

<div class="container">
    <h2 class="mb-4">食品介绍</h2>

    <div class="alert alert-info" th:if="${announcement != null}">
        <h5 class="alert-heading" th:text="${announcement.title} ?: '公告'">公告</h5>
        <p th:text="${announcement.content}">这里是公告内容。</p>
    </div>

    <div class="row" th:if="${foods != null}">
        <div class="col-md-4 mb-4" th:each="food : ${foods}">
            <div class="card h-100">
                <img th:src="${food.imagePath}" class="card-img-top" alt="food image">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title" th:text="${food.name}">食品名称</h5>
                    <p class="card-text small text-muted" th:text="${food.ingredients}">成分列表</p>
                    <div class="mt-auto d-flex justify-content-between align-items-center">
                        <span class="text-secondary">
                            ❤ <span th:text="${food.likeCount}">0</span>
                        </span>
                        <form th:action="@{'/foods/' + ${food.id} + '/like'}" method="post" th:if="${likedIds != null}">
                            <button class="btn btn-sm"
                                    th:classappend="${likedIds.contains(food.id)} ? 'btn-secondary' : 'btn-outline-danger'"
                                    th:disabled="${likedIds.contains(food.id)}"
                                    type="submit"
                            >
                                <span th:text="${likedIds.contains(food.id)} ? '已点赞' : '点赞'">点赞</span>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
