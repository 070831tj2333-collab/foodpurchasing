spring:
  datasource:
    url: jdbc:mysql://localhost:3306/campus_food?useSSL=false&serverTimezone=UTC&characterEncoding=utf-8
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  thymeleaf:
    cache: false

server:
  port: 8080

logging:
  level:
    org.springframework.security: INFO

app:
  upload-dir: uploads/foods

